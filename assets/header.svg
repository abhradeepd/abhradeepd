<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 220" width="1000" height="220" role="img" aria-label="Abhradeep Das — Analytics Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151833"/>
      <stop offset="0.55" stop-color="#101223"/>
      <stop offset="1" stop-color="#0C0E1C"/>
    </linearGradient>
    <radialGradient id="orbA">
      <stop offset="0" stop-color="#9D7CD8" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#9D7CD8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbB">
      <stop offset="0" stop-color="#E67E22" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#E67E22" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbC">
      <stop offset="0" stop-color="#D6456E" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#D6456E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E67E22"/>
      <stop offset="0.5" stop-color="#D6456E"/>
      <stop offset="1" stop-color="#9D7CD8" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="card"><rect x="0" y="0" width="1000" height="220" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#card)">
    <rect width="1000" height="220" fill="url(#bg)"/>
    <circle cx="845" cy="55" r="205" fill="url(#orbA)"/>
    <circle cx="110" cy="205" r="230" fill="url(#orbB)"/>
    <circle cx="600" cy="225" r="185" fill="url(#orbC)"/>

    <!-- identity -->
    <text x="56" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="13" letter-spacing="3.4" fill="#E67E22">// ANALYTICS ENGINEER</text>
    <text x="54" y="112" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif"
          font-size="44" font-weight="700" letter-spacing="-1.2" fill="#F3F4FC">Abhradeep Das</text>
    <rect x="56" y="126" width="176" height="2" rx="1" fill="url(#rule)"/>
    <text x="56" y="152" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif"
          font-size="15" fill="#9AA2C2">I build data models people can trust.<tspan fill="#E67E22" dx="6">▌<animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/></tspan></text>

    <!-- pipeline -->
    <line x1="96" y1="186" x2="672" y2="186" stroke="#2C3050" stroke-width="1.5"/>

    <circle cx="96" cy="186" r="4" fill="#0F1124" stroke="#9D7CD8" stroke-width="1.5"/>
    <circle cx="240" cy="186" r="4" fill="#0F1124" stroke="#9D7CD8" stroke-width="1.5"/>
    <circle cx="384" cy="186" r="4" fill="#0F1124" stroke="#9D7CD8" stroke-width="1.5"/>
    <circle cx="528" cy="186" r="4" fill="#0F1124" stroke="#9D7CD8" stroke-width="1.5"/>
    <circle cx="672" cy="186" r="4" fill="#0F1124" stroke="#E67E22" stroke-width="1.5"/>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10.5"
       fill="#8B92B0" text-anchor="middle" letter-spacing="0.6">
      <text x="96" y="207">raw sources</text>
      <text x="240" y="207">ingest</text>
      <text x="384" y="207">warehouse</text>
      <text x="528" y="207">model + test</text>
      <text x="672" y="207">serve</text>
    </g>

    <circle cy="186" r="3.2" fill="#E67E22">
      <animate attributeName="cx" values="96;672" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cy="186" r="2.6" fill="#D6456E">
      <animate attributeName="cx" values="96;672" dur="3.6s" begin="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" dur="3.6s" begin="1.8s" repeatCount="indefinite"/>
    </circle>

    <!-- eclipse -->
    <circle cx="862" cy="108" r="64" fill="none" stroke="#9D7CD8" stroke-opacity="0.26" stroke-width="1"/>
    <circle cx="862" cy="108" r="64" fill="none" stroke="#E67E22" stroke-opacity="0.30" stroke-width="1.4"
            stroke-linecap="round" stroke-dasharray="66 336" transform="rotate(-58 862 108)"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 862 108" to="360 862 108"
                        dur="26s" repeatCount="indefinite"/>
      <circle cx="862" cy="44" r="11" fill="#E67E22" opacity="0.16"/>
      <circle cx="862" cy="44" r="4.6" fill="#E67E22"/>
      <g transform="rotate(120 862 108)">
        <circle cx="862" cy="44" r="9" fill="#D6456E" opacity="0.14"/>
        <circle cx="862" cy="44" r="3.6" fill="#D6456E"/>
      </g>
      <g transform="rotate(240 862 108)">
        <circle cx="862" cy="44" r="9" fill="#9D7CD8" opacity="0.14"/>
        <circle cx="862" cy="44" r="3.6" fill="#9D7CD8"/>
      </g>
    </g>
  </g>
  <rect x="0.5" y="0.5" width="999" height="219" rx="18" fill="none" stroke="#2C3050"/>
</svg>
